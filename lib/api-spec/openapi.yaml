openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: KlaimKavach API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication
  - name: insurance
    description: Insurance operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /register:
    post:
      operationId: registerUser
      tags: [auth]
      summary: Register a new gig worker
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
      responses:
        "200":
          description: Registration successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RegisterResponse"
  /dashboard:
    get:
      operationId: getDashboard
      tags: [insurance]
      summary: Get dashboard data
      responses:
        "200":
          description: Dashboard data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardData"
  /disruption:
    get:
      operationId: checkDisruption
      tags: [insurance]
      summary: Check for active weather disruptions
      responses:
        "200":
          description: Disruption status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DisruptionStatus"
  /claim:
    post:
      operationId: submitClaim
      tags: [insurance]
      summary: Submit an insurance claim
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ClaimRequest"
      responses:
        "200":
          description: Claim submitted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClaimResponse"
  /fraud:
    post:
      operationId: getFraudStatus
      tags: [insurance]
      summary: Calculate fraud trust score from telemetry signals
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FraudInput"
      responses:
        "200":
          description: Fraud detection result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FraudStatus"
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    RegisterRequest:
      type: object
      properties:
        name:
          type: string
        email:
          type: string
        phone:
          type: string
        vehicle:
          type: string
        city:
          type: string
      required:
        - name
        - email
        - phone
        - vehicle
        - city
    RegisterResponse:
      type: object
      properties:
        success:
          type: boolean
        userId:
          type: string
        message:
          type: string
      required:
        - success
        - message
    DashboardData:
      type: object
      properties:
        userName:
          type: string
        riskScore:
          type: number
        riskLevel:
          type: string
        weeklyPremium:
          type: number
        coverageAmount:
          type: number
        activePolicies:
          type: number
        totalClaims:
          type: number
        lastUpdated:
          type: string
      required:
        - userName
        - riskScore
        - riskLevel
        - weeklyPremium
        - coverageAmount
        - activePolicies
        - totalClaims
        - lastUpdated
    DisruptionStatus:
      type: object
      properties:
        hasDisruption:
          type: boolean
        type:
          type: string
        severity:
          type: string
        message:
          type: string
        eligibleForClaim:
          type: boolean
      required:
        - hasDisruption
        - eligibleForClaim
    ClaimRequest:
      type: object
      properties:
        hoursLost:
          type: number
        reason:
          type: string
      required:
        - hoursLost
        - reason
    ClaimResponse:
      type: object
      properties:
        success:
          type: boolean
        claimId:
          type: string
        payoutAmount:
          type: number
        status:
          type: string
        message:
          type: string
      required:
        - success
        - status
        - message
    FraudStatus:
      type: object
      properties:
        trustScore:
          type: number
        status:
          type: string
        label:
          type: string
        details:
          type: string
      required:
        - trustScore
        - status
        - label
    FraudInput:
      type: object
      properties:
        latitude:
          type: number
        longitude:
          type: number
        ipAddress:
          type: string
